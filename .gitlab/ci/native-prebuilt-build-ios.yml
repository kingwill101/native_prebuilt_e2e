native_prebuilt:build:ios:
  stage: build
  tags:
    - saas-macos-medium-m1
  image: macos-26-xcode-26
  rules:
    - if: '$CI_COMMIT_TAG && $ENABLE_ALL_PLATFORMS == "true"'
  before_script:
    - if ! command -v dart >/dev/null 2>&1; then brew update && brew install dart; fi
    - dart --version
  script:
    - dart pub get
    - "$BUILD_COMMAND"
  artifacts:
    when: always
    paths:
      - .dart_tool/lib/
