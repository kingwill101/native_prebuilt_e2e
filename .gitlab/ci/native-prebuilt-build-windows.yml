native_prebuilt:build:windows:
  stage: build
  tags:
    - saas-windows-medium-amd64
  rules:
    - if: '$CI_COMMIT_TAG && $ENABLE_ALL_PLATFORMS == "true"'
  before_script:
    - if (-not (Get-Command dart -ErrorAction SilentlyContinue)) { choco install dart-sdk -y --no-progress }
    - dart --version
  script:
    - dart pub get
    - Invoke-Expression $env:BUILD_COMMAND
  artifacts:
    when: always
    paths:
      - .dart_tool/lib/
