native_prebuilt:build:linux:
  stage: build
  image: dart:stable
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - apt-get update
    - apt-get install -y --no-install-recommends build-essential clang pkg-config cmake ninja-build libclang-dev
    - dart pub get
    - "$BUILD_COMMAND"
  artifacts:
    when: always
    paths:
      - .dart_tool/lib/
