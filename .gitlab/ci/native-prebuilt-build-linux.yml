native_prebuilt:build:linux:
  stage: build
  image: dart:stable
  script:
    - apt-get update
    - apt-get install -y --no-install-recommends build-essential clang pkg-config cmake ninja-build libclang-dev
    - dart pub get
    - "$BUILD_COMMAND"
    - mkdir -p "$BUILT_LIBRARY_DIR"
    - cp -R .dart_tool/lib/. "$BUILT_LIBRARY_DIR"/
  artifacts:
    when: always
    paths:
      - "$BUILT_LIBRARY_DIR/"
