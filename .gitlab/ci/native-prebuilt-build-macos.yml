native_prebuilt:build:macos:
  stage: build
  tags:
    - saas-macos-medium-m1
  image: macos-26-xcode-26
  before_script:
    - if ! command -v dart >/dev/null 2>&1; then brew update && brew install dart; fi
    - sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
    - sudo xcodebuild -runFirstLaunch
    - dart --version
  script:
    - dart pub get
    - dart test
  artifacts:
    when: always
    paths:
      - .dart_tool/lib/
