native_prebuilt:update_manifest:
  stage: update
  needs:
    - job: native_prebuilt:build:linux
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - dart pub get
    - dart run native_prebuilt manifest update --config "$CONFIG" --output "$MANIFEST_OUTPUT" --built-library-dir "$BUILT_LIBRARY_DIR" --tag "$TAG"
  artifacts:
    when: always
    paths:
      - "$MANIFEST_OUTPUT"
