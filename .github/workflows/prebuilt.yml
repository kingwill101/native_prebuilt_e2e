name: Prebuilt

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string
  push:
    tags:
      - 'native_prebuilt_e2e-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x64
          - runner: macos-latest
            platform: macos-arm64
          - runner: windows-latest
            platform: windows-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - name: Build native artifact
        shell: bash
        run: |
          mkdir -p build/${{ matrix.platform }}
          echo "TODO: compile src/native/demo.c for ${{ matrix.platform }}"
          echo "42" > build/${{ matrix.platform }}/artifact.txt
      - uses: actions/upload-artifact@v4
        with:
          name: native_prebuilt_e2e-${{ matrix.platform }}
          path: build/${{ matrix.platform }}

  update-manifest:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart run native_prebuilt manifest update --config native_prebuilt.yaml --output lib/src/hook/demo_prebuilts.g.dart --tag ${{ inputs.tag || github.ref_name }}
